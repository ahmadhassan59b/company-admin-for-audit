<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      document.documentElement.classList.add('app-loading');
    </script>
    <title>Verify Email | HubAudit</title>
    <link rel="icon" href="/static/logo-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <a class="skipLink" href="#main">Skip to content</a>
    <nav class="topNav">
      <div class="container topNavInner">
        <a class="brand" href="/">
          <img class="brandLogo" src="/static/logo-mark.svg" alt="HubAudit" />
          <span class="brandWord"><span class="hub">Hub</span><span class="audit">Audit</span></span>
        </a>
        <div class="navActions">
          <span class="pill">Account verification</span>
        </div>
      </div>
    </nav>

    <main class="authShell" id="main">
      <section class="card authCard">
        <div class="cardPad">
          <div class="authTop">
            <div>
              <h1 class="authTitle" id="title">Verifying your email</h1>
              <p class="authHint" id="subtitle">
                Please wait while we confirm the verification link from your inbox.
              </p>
            </div>
          </div>

          <div
            id="statusBox"
            style="margin-top: 14px; padding: 14px; border-radius: var(--radius); border: 1px solid rgba(255, 108, 74, 0.18); background: rgba(255, 108, 74, 0.06); line-height: 1.5"
          >
            <div id="statusText">Checking link...</div>
          </div>

          <div id="actionRow" style="display:none; margin-top: 14px; gap: 10px; flex-wrap: wrap">
            <a class="btnPrimary" href="/login" id="loginLink" style="display:inline-flex; align-items:center">Go to login</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      window.addEventListener('DOMContentLoaded', async () => {
        const { apiFetch, setAppReady, $ } = window.HubSpotAuditUI;
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        function setStatus(text, variant = 'success') {
          $('statusText').textContent = text;
          $('statusBox').style.borderColor =
            variant === 'success' ? 'rgba(22, 163, 74, 0.22)' : 'rgba(220, 38, 38, 0.22)';
          $('statusBox').style.background =
            variant === 'success' ? 'rgba(22, 163, 74, 0.08)' : 'rgba(220, 38, 38, 0.06)';
          $('statusBox').style.color = 'var(--text)';
        }

        if (!token) {
          setStatus('The verification link is missing its token.', 'error');
          $('title').textContent = 'Verification failed';
          $('subtitle').textContent = 'Open the verification link from the email again or request a new one.';
          $('actionRow').style.display = 'flex';
          setAppReady();
          return;
        }

        try {
          await apiFetch(`/api/auth/verify-email?token=${encodeURIComponent(token)}`, {
            method: 'GET'
          });

          setStatus('Your email has been verified. You can now log in.', 'success');
          $('title').textContent = 'Email verified';
          $('subtitle').textContent = 'Your account is now active.';
          $('actionRow').style.display = 'flex';

          window.setTimeout(() => {
            window.location.assign('/login?verified=1');
          }, 1200);
        } catch (error) {
          setStatus(error.message || 'The verification link is invalid or expired.', 'error');
          $('title').textContent = 'Verification failed';
          $('subtitle').textContent = 'Request a new verification email from the login screen.';
          $('actionRow').style.display = 'flex';
        } finally {
          setAppReady();
        }
      });
    </script>
  </body>
</html>
