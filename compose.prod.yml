services:
  backend:
    image: ${DOCKERHUB_NAMESPACE:?Set DOCKERHUB_NAMESPACE}/hubaudit-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      ADMIN_DASHBOARD_REQUIRE_AUTH: "true"
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8

  ui:
    image: ${DOCKERHUB_NAMESPACE:?Set DOCKERHUB_NAMESPACE}/hubaudit-ui:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      UI_PORT: 3001
      API_BASE_URL: http://backend:3000
    ports:
      - "${UI_PORT:-3001}:3001"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health/version').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
